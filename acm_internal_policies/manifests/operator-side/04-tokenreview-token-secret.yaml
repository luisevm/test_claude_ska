# Long-lived token for the token-review ServiceAccount.
# The service account token controller automatically populates the
# 'token', 'ca.crt', and 'namespace' fields in the data section.
#
# This token is used by the central platform service (on a different cluster)
# to perform TokenReview requests against THIS cluster's API server.
# It is NOT transmitted to operators — it stays server-side.
apiVersion: v1
kind: Secret
metadata:
  name: token-review-sa-token
  namespace: platform-automation
  annotations:
    kubernetes.io/service-account.name: token-review-sa
  labels:
    app.kubernetes.io/part-of: internal-trust
    app.kubernetes.io/component: token-review
type: kubernetes.io/service-account-token
