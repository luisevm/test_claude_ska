# The operator uses a projected service account token (PSAT) to authenticate
# against the central platform service. The token is short-lived (1 hour)
# and scoped to a specific audience ("platform-services").
#
# From the central service's perspective, this token is OPAQUE — the service
# cannot validate it locally. Instead, it performs a TokenReview against
# this cluster's API server using the long-lived token-review-sa token.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dataclassification-agent
  namespace: platform-automation
  labels:
    app: dataclassification-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dataclassification-agent
  template:
    metadata:
      labels:
        app: dataclassification-agent
    spec:
      serviceAccountName: dataclassification-agent
      containers:
        - name: agent
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "=== dataclassification-agent started ==="
              echo "Service URL: $PLATFORM_SERVICE_URL"
              echo "Token path:  $TOKEN_PATH"
              while true; do
                if [ -f "$TOKEN_PATH" ]; then
                  TOKEN=$(cat "$TOKEN_PATH")
                  RAW=$(echo "$TOKEN" | cut -d. -f2)
                  PAD=$(( 4 - ${#RAW} % 4 )); [ $PAD -eq 4 ] && PAD=0
                  PAYLOAD=$(printf "%s%.*s" "$RAW" $PAD "====" | base64 -d 2>/dev/null)
                  echo "$(date -Iseconds) PSAT ok (${#TOKEN} bytes)"
                  echo "  $PAYLOAD"
                else
                  echo "$(date -Iseconds) ERROR: token not found at $TOKEN_PATH"
                fi
                sleep 60
              done
          env:
            - name: PLATFORM_SERVICE_URL
              value: "https://platform-integration-service.platform-services.svc.cluster.local:8443"
            - name: TOKEN_PATH
              value: "/var/run/secrets/platform-services/token"
          volumeMounts:
            - name: psat-token
              mountPath: /var/run/secrets/platform-services
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        # Projected SA token with audience scoped to the platform service.
        # This token is short-lived (3600s = 1 hour) and auto-rotated by kubelet.
        - name: psat-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: "platform-services"
                  expirationSeconds: 3600
                  path: token
