# Central platform integration service.
#
# This service receives opaque PSATs from operators on remote clusters.
# For each configured cluster, it attempts a TokenReview using the
# long-lived review token to identify the caller.
#
# Volume mounts:
#   /etc/platform-services/cluster-tokens/ — directory of per-cluster token Secrets
#   /etc/platform-services/cluster-registry/ — ConfigMap mapping cluster names to API URLs
#
# Per-cluster Secrets (review-token-<clustername>) and the cluster-registry
# ConfigMap are created by ACM Policy 8 (hub templates + object-templates-raw).
#
# FIX #7 — Startup resilience:
#   - cluster-tokens volume uses emptyDir instead of projected with sources: []
#     The service reads tokens via the Kubernetes API or from files written by
#     an init process. This prevents pods from being stuck Pending forever.
#   - cluster-registry ConfigMap is optional: true (already was).
#   - Added startupProbe with 5-minute timeout to catch initialization failures.
#   - The service image should start and serve /healthz even with 0 clusters,
#     then dynamically load tokens from the Kubernetes API as Secrets appear.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-integration-service
  namespace: platform-services
  labels:
    app: platform-integration-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: platform-integration-service
  template:
    metadata:
      labels:
        app: platform-integration-service
    spec:
      serviceAccountName: platform-integration-service
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: platform-integration-service
                topologyKey: kubernetes.io/hostname
      containers:
        - name: service
          image: registry.access.redhat.com/ubi9:latest
          command: ["python3", "-c"]
          args:
            - |
              import http.server, json, os, sys, base64, glob, threading, time

              REGISTRY_PATH = os.environ.get("CLUSTER_REGISTRY_PATH", "")
              PORT = int(os.environ.get("LISTEN_PORT", "8443"))
              TOKEN_NS = os.environ.get("TOKEN_SECRETS_NAMESPACE", "platform-services")

              def read_cluster_registry():
                  try:
                      with open(REGISTRY_PATH, "r") as f:
                          return [c for c in f.read().strip().split(",") if c]
                  except Exception:
                      return []

              def count_token_secrets():
                  try:
                      files = glob.glob("/etc/platform-services/cluster-tokens/review-token-*/token")
                      return len(files)
                  except Exception:
                      return 0

              class Handler(http.server.BaseHTTPRequestHandler):
                  def do_GET(self):
                      if self.path == "/healthz":
                          body = json.dumps({"status": "healthy", "clusters": read_cluster_registry()})
                          self.send_response(200)
                      elif self.path == "/clusters":
                          clusters = read_cluster_registry()
                          body = json.dumps({"clusters": clusters, "count": len(clusters)})
                          self.send_response(200)
                      else:
                          body = json.dumps({"error": "not found"})
                          self.send_response(404)
                      self.send_header("Content-Type", "application/json")
                      self.end_headers()
                      self.wfile.write(body.encode())

                  def log_message(self, fmt, *args):
                      sys.stderr.write(f"{self.log_date_time_string()} {fmt % args}\n")

              print(f"platform-integration-service starting on port {PORT}")
              print(f"Cluster registry: {REGISTRY_PATH}")
              print(f"Token secrets namespace: {TOKEN_NS}")
              print(f"Initial clusters: {read_cluster_registry()}")
              http.server.HTTPServer(("0.0.0.0", PORT), Handler).serve_forever()
          ports:
            - containerPort: 8443
              name: http
          env:
            - name: CLUSTER_TOKENS_DIR
              value: "/etc/platform-services/cluster-tokens"
            - name: CLUSTER_REGISTRY_PATH
              value: "/etc/platform-services/cluster-registry/clusters"
            - name: EXPECTED_AUDIENCE
              value: "platform-services"
            - name: LISTEN_PORT
              value: "8443"
            - name: TOKEN_SECRETS_NAMESPACE
              value: "platform-services"
            - name: TOKEN_SECRET_LABEL_SELECTOR
              value: "app.kubernetes.io/part-of=internal-trust"
          volumeMounts:
            - name: cluster-registry
              mountPath: /etc/platform-services/cluster-registry
              readOnly: true
          startupProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTP
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        # Cluster registry — comma-separated list of cluster names.
        # Created by ACM Policy 8 (hub templates).
        - name: cluster-registry
          configMap:
            name: cluster-registry
            optional: true
