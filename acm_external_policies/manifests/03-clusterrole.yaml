apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: oidc-proxy-reader
rules:
  - nonResourceURLs:
      - /openid/v1/jwks
    verbs:
      - get
  - nonResourceURLs:
      - /.well-known/oauth-authorization-server
      - /.well-known/openid-configuration
    verbs:
      - get
