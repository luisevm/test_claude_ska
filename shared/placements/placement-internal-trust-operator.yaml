apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-internal-trust-operator
  namespace: acm-policies
spec:
  clusterSets:
    - all-openshift-clusters
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: internal-trust
              operator: In
              values:
                - "operator"
            - key: vendor
              operator: In
              values:
                - "OpenShift"
