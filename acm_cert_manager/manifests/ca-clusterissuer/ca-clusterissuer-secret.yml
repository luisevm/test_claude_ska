---
# Self-signed CA for lab/testing (CN=ACM Lab CA, valid 10 years).
# Generated with: openssl req -x509 -newkey rsa:2048 -keyout tls.key -out tls.crt \
#   -days 3650 -nodes -subj "/CN=ACM Lab CA"
# For production, replace with your organization's PKI CA certificate.
apiVersion: v1
kind: Secret
metadata:
  name: ca-clusterissuer-tls
  namespace: cert-manager
type: kubernetes.io/tls
data:
  tls.crt: ""
  tls.key: ""
