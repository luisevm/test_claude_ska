---
# REPLACE: This is a PLACEHOLDER. You must supply your own CA certificate
# and private key. Generate a self-signed CA for testing:
#   openssl req -x509 -newkey rsa:2048 -keyout tls.key -out tls.crt \
#     -days 9125 -nodes -subj "/CN=My CA"
#   oc create secret tls ca-clusterissuer-tls -n cert-manager \
#     --cert=tls.crt --key=tls.key --dry-run=client -o yaml
#
# For production, use your organization's PKI CA certificate.
apiVersion: v1
kind: Secret
metadata:
  name: ca-clusterissuer-tls
  namespace: cert-manager
type: kubernetes.io/tls
data:
  tls.crt: ""
  tls.key: ""
